name: Check and Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        python -c "import sys; print(sys.version)"
        python -m pip install --upgrade pip
        pip install build

    - name: Build Package
      run: |
        python -m build

    - name: Verify Wheel Contents
      run: |
        python -c "
        import zipfile, sys
        whl = list(__import__('pathlib').Path('dist').glob('*.whl'))[0]
        names = zipfile.ZipFile(whl).namelist()
        required = [
            'memorylake_hermes/__init__.py',
            'memorylake_hermes/client.py',
            'memorylake_hermes/get_config.py',
            'memorylake_hermes/plugin.yaml',
        ]
        missing = [f for f in required if f not in names]
        if missing:
            print(f'ERROR: missing from wheel: {missing}')
            sys.exit(1)
        skills = [n for n in names if 'memorylake_hermes/skills/' in n]
        if not skills:
            print('ERROR: no skills files found in wheel')
            sys.exit(1)
        print(f'Wheel OK — {len(skills)} skills files included.')
        "

    - name: Verify Sdist Contents
      run: |
        python -c "
        import tarfile, sys, fnmatch
        sdist = list(__import__('pathlib').Path('dist').glob('*.tar.gz'))[0]
        names = tarfile.open(sdist).getnames()
        skills = [n for n in names if '/memorylake_hermes/skills/' in n]
        if not skills:
            print('ERROR: no skills files found in sdist')
            sys.exit(1)
        print(f'Sdist OK — {len(skills)} skills files included.')
        "
